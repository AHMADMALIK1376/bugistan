<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100vh; overflow: hidden;
            font-family: 'Georgia', serif;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 36 36"><text y="32" font-size="32">🩴</text></svg>') 18 4, auto;
        }
        #area { display: flex; flex-direction: column; width: 100%; height: 100%; }
        #hdr {
            text-align: center; padding: 7px 12px;
            background: linear-gradient(135deg, #1a0a00 0%, #3d1500 40%, #1a0a00 100%);
            color: #FFD080; font-size: 13px; font-weight: bold; letter-spacing: 4px;
            text-shadow: 0 0 10px #FF8800, 0 0 25px #FF4400;
            border-bottom: 2px solid #FF6600; z-index: 10;
        }
        #info {
            text-align: center; padding: 4px 8px; font-size: 10px;
            color: #FFE0A0;
            background: linear-gradient(90deg, #1a0800 0%, #2d1200 50%, #1a0800 100%);
            border-bottom: 1px solid #AA4400; z-index: 10; letter-spacing: 1px;
        }
        #info .red { color: #FF6060; }
        #info .yellow { color: #FFD040; }
        canvas { flex-grow: 1; display: block; }
    </style>
</head>
<body>
<div id="area">
    <div id="hdr">🌿 BUG GARDEN 🩴</div>
    <div id="info">
        <span class="red">🔴 Errors: <b id="errCount">0</b></span> |
        <span class="yellow">🟡 Warnings: <b id="warnCount">0</b></span> |
        🩴 Killed: <b id="kc">0</b> | ⚡ Combo: <b id="combo">0</b>
    </div>
    <canvas id="c"></canvas>
</div>
<script>
// ============================================================
// SETUP
// ============================================================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const errCountEl = document.getElementById('errCount');
const warnCountEl = document.getElementById('warnCount');
const kc = document.getElementById('kc');
const comboEl = document.getElementById('combo');

let W, H, frame = 0;
let mouse = { x: -999, y: -999 };
let bugs = [], killed = 0;
let errorTarget = 0, warningTarget = 0;
let combo = 0, comboTimer = 0, particles = [];

function resize() {
    W = canvas.width = canvas.clientWidth;
    H = canvas.height = canvas.clientHeight;
    buildTerrain();
    buildGrass();
    buildFlowers();
}
window.addEventListener('resize', resize);
canvas.addEventListener('mousemove', e => {
    const r = canvas.getBoundingClientRect();
    mouse.x = e.clientX - r.left;
    mouse.y = e.clientY - r.top;
});

// ============================================================
// TERRAIN
// ============================================================
let terrainPts = [];
function buildTerrain() {
    terrainPts = [];
    for (let i = 0; i <= 60; i++) {
        const x = (i / 60) * W;
        const noise = Math.sin(i * 0.4) * 18 + Math.sin(i * 0.9) * 10 + Math.sin(i * 2.1) * 5;
        terrainPts.push({ x, y: H * 0.78 + noise });
    }
}
function getGroundY(x) {
    for (let i = 0; i < terrainPts.length - 1; i++) {
        if (x >= terrainPts[i].x && x <= terrainPts[i+1].x) {
            const t = (x - terrainPts[i].x) / (terrainPts[i+1].x - terrainPts[i].x);
            return terrainPts[i].y + (terrainPts[i+1].y - terrainPts[i].y) * t;
        }
    }
    return H * 0.78;
}

// ============================================================
// GRASS
// ============================================================
const GRASS = [];
function buildGrass() {
    GRASS.length = 0;
    for (let i = 0; i < Math.max(120, Math.floor(W / 4)); i++) {
        GRASS.push({
            x: Math.random() * W, h: 20 + Math.random() * 55,
            phase: Math.random() * Math.PI * 2, w: 0.9 + Math.random() * 1.5,
            bright: Math.random(), layer: Math.floor(Math.random() * 3)
        });
    }
    GRASS.sort((a, b) => a.layer - b.layer);
}

// ============================================================
// FLOWERS
// ============================================================
const FLOWER_PALETTES = [
    { p: '#FF3D7F', c: '#FFD700', l: '#FF69B4' },
    { p: '#FF6B00', c: '#FFF200', l: '#FF9500' },
    { p: '#9B30FF', c: '#FFD700', l: '#C87AFF' },
    { p: '#FF2222', c: '#FFD700', l: '#FF7070' },
    { p: '#00D4AA', c: '#FFFFFF', l: '#00FFD0' },
    { p: '#F5E642', c: '#FF8C00', l: '#FFF580' },
    { p: '#FF66CC', c: '#FFFF00', l: '#FFAAEE' },
    { p: '#44AAFF', c: '#FFFFFF', l: '#88CCFF' },
];
let flowers = [];
function buildFlowers() {
    flowers = [];
    for (let i = 0; i < 28; i++) {
        const pal = FLOWER_PALETTES[i % 8];
        const rx = 0.03 + (i / 28) * 0.94 + (Math.random() - 0.5) * 0.02;
        flowers.push({
            rx, rootY: getGroundY(rx * W), pal,
            phase: Math.random() * Math.PI * 2,
            size: 4 + Math.random() * 7,
            stem: 28 + Math.random() * 55,
            n: 5 + Math.floor(Math.random() * 4),
        });
    }
}

// ============================================================
// CLOUDS
// ============================================================
const CLOUDS = [];
for (let i = 0; i < 6; i++) {
    CLOUDS.push({
        rx: Math.random(), y: 20 + Math.random() * 90,
        s: 0.5 + Math.random() * 1.1, speed: 0.04 + Math.random() * 0.12,
        alpha: 0.55 + Math.random() * 0.35
    });
}

// ============================================================
// BUG TYPES (canFly added)
// ============================================================
const bugTypes = [
    { name: 'Jewel Beetle', size: 15, speed: 1.1,  canFly: false },
    { name: 'Ladybug',      size: 13, speed: 0.95, canFly: true  },
    { name: 'Fire Ant',     size: 10, speed: 1.8,  canFly: false },
    { name: 'Tarantula',    size: 17, speed: 0.65, canFly: false },
    { name: 'Caterpillar',  size: 12, speed: 0.55, canFly: false },
    { name: 'Dragonfly',    size: 14, speed: 2.2,  canFly: true  },
];

// ============================================================
// BUG CLASS
// ============================================================
class Bug {
    constructor(type, isWarning) {
        this.type = type !== undefined ? type : Math.floor(Math.random() * bugTypes.length);
        this.bug = bugTypes[this.type];
        this.isWarning = isWarning || false;
        this.canFly = this.bug.canFly || false;
        this.x = 30 + Math.random() * (W - 60);
        if (this.canFly) {
            this.y = 30 + Math.random() * (H * 0.5);
        } else {
            this.y = getGroundY(this.x) - 20 - Math.random() * 15;
        }
        this.vx = (Math.random() - 0.5) * this.bug.speed;
        this.vy = this.canFly ? (Math.random() - 0.5) * this.bug.speed : 0;
        this.size = this.isWarning ? this.bug.size * 0.7 + Math.random() * 3 : this.bug.size + Math.random() * 4;
        this.alive = true;
        this.legPhase = Math.random() * Math.PI * 2;
        this.antennaPhase = Math.random() * Math.PI * 2;
        this.wingPhase = Math.random() * Math.PI * 2;
        this.fleeTimer = 0;
        this.wobble = Math.random() * Math.PI * 2;
        this.trail = [];
    }

    update() {
        if (!this.alive) return;
        const dx = mouse.x - this.x, dy = mouse.y - this.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const fleeing = dist < 90;
        if (fleeing) {
            this.fleeTimer = 25;
            this.vx -= (dx / dist) * 0.6;
            if (this.canFly) this.vy -= (dy / dist) * 0.6;
        }
        if (this.fleeTimer > 0) this.fleeTimer--;
        this.x += this.vx;
        if (this.canFly) {
            this.y += this.vy;
        } else {
            const groundY = getGroundY(this.x);
            this.y = groundY - 10 - Math.sin(this.wobble) * 3;
            this.vy = 0;
        }
        this.wobble += 0.06;
        this.legPhase += 0.28 * this.bug.speed;
        this.antennaPhase += 0.12;
        this.wingPhase += 0.35;
        const spd = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
        if (spd > this.bug.speed * 2.5) { this.vx *= 0.88; this.vy *= 0.88; }
        if (this.x < 12 || this.x > W - 12) this.vx *= -1;
        this.x = Math.max(12, Math.min(W - 12, this.x));
        if (this.canFly) {
            if (this.y < 25 || this.y > H * 0.6) this.vy *= -1;
            this.y = Math.max(25, Math.min(H * 0.6, this.y));
        }
        if (Math.random() < 0.006 && !fleeing) {
            this.vx = (Math.random() - 0.5) * this.bug.speed;
            if (this.canFly) this.vy = (Math.random() - 0.5) * this.bug.speed;
        }
        if ((this.type === 5 && this.canFly) || fleeing) {
            this.trail.push({ x: this.x, y: this.y, a: 0.35 });
            if (this.trail.length > 6) this.trail.shift();
            for (let t of this.trail) t.a -= 0.04;
        }
    }

    draw(ctx) {
        if (!this.alive) return;
        for (let t of this.trail) {
            ctx.save(); ctx.globalAlpha = Math.max(0, t.a);
            ctx.fillStyle = this.isWarning ? '#FFD040' : '#88FFAA';
            ctx.beginPath(); ctx.arc(t.x, t.y, this.size * 0.25, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        }
        ctx.save(); ctx.translate(this.x, this.y);
        const s = this.size;
        const angle = Math.atan2(this.vy, this.vx);
        ctx.rotate(angle + Math.PI / 2);
        const bob = Math.sin(this.wobble) * 1.2;
        const fleeing = this.fleeTimer > 0;
        ctx.save(); ctx.rotate(-(angle + Math.PI / 2));
        ctx.fillStyle = 'rgba(0,0,0,0.22)';
        ctx.beginPath(); ctx.ellipse(0, s * 0.7, s * 0.9, s * 0.18, 0, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
        if (this.isWarning && !fleeing) {
            ctx.strokeStyle = 'rgba(255,200,0,0.6)'; ctx.lineWidth = 1.2;
            ctx.setLineDash([4, 3]);
            ctx.beginPath(); ctx.arc(0, bob, s * 1.45, 0, Math.PI * 2); ctx.stroke();
            ctx.setLineDash([]);
        }
        switch (this.type) {
            case 0: this._jewelBeetle(ctx, s, bob); break;
            case 1: this._ladybug(ctx, s, bob); break;
            case 2: this._fireAnt(ctx, s, bob); break;
            case 3: this._tarantula(ctx, s, bob); break;
            case 4: this._caterpillar(ctx, s, bob); break;
            case 5: this._dragonfly(ctx, s, bob); break;
        }
        if (fleeing) {
            ctx.strokeStyle = 'rgba(255,240,60,0.9)'; ctx.lineWidth = 2.5;
            ctx.beginPath(); ctx.arc(0, bob, s * 1.55, 0, Math.PI * 2); ctx.stroke();
            for (let i = 0; i < 4; i++) {
                const a = i * Math.PI / 2;
                ctx.strokeStyle = 'rgba(255,255,120,0.5)'; ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(Math.cos(a) * s * 1.6, Math.sin(a) * s * 1.6 + bob);
                ctx.lineTo(Math.cos(a) * s * 2.2, Math.sin(a) * s * 2.2 + bob);
                ctx.stroke();
            }
        }
        ctx.restore();
    }

    _jewelBeetle(ctx, s, bob) {
        const legPairs = [[-0.45,-0.3],[0,0],[0.45,0.3]];
        for (let side of [-1,1]) {
            for (let i = 0; i < 3; i++) {
                const lx = legPairs[i][0] * s, ly = legPairs[i][1] * s + bob;
                const swing = Math.sin(this.legPhase + i * 1.1 + (side > 0 ? Math.PI : 0)) * s * 0.5;
                const knee = { x: lx + side * s * 0.7, y: ly + s * 0.3 + swing * 0.4 };
                const foot = { x: lx + side * s * 1.2, y: ly + s * 0.65 + swing };
                ctx.strokeStyle = '#4A3000'; ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(knee.x, knee.y); ctx.lineTo(foot.x, foot.y); ctx.stroke();
                ctx.fillStyle = '#2A1800'; ctx.beginPath(); ctx.arc(foot.x, foot.y, s * 0.06, 0, Math.PI * 2); ctx.fill();
            }
        }
        const elG = ctx.createLinearGradient(-s*0.8, bob-s*0.8, s*0.8, bob+s*0.8);
        elG.addColorStop(0,'#00C8A0'); elG.addColorStop(0.25,'#0090FF');
        elG.addColorStop(0.5,'#8800FF'); elG.addColorStop(0.75,'#00E050'); elG.addColorStop(1,'#00AAFF');
        ctx.fillStyle = elG; ctx.beginPath(); ctx.ellipse(0, bob, s*0.72, s*1.05, 0, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(0, bob-s*1.0); ctx.lineTo(0, bob+s*1.0); ctx.stroke();
        ctx.strokeStyle = 'rgba(255,200,0,0.55)'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.ellipse(0, bob, s*0.72, s*1.05, 0, 0, Math.PI*2); ctx.stroke();
        const gloss = ctx.createRadialGradient(-s*0.2, bob-s*0.5, 0, -s*0.2, bob-s*0.5, s*0.55);
        gloss.addColorStop(0,'rgba(255,255,255,0.45)'); gloss.addColorStop(1,'rgba(255,255,255,0)');
        ctx.fillStyle = gloss; ctx.beginPath(); ctx.ellipse(0, bob, s*0.72, s*1.05, 0, 0, Math.PI*2); ctx.fill();
        const thG = ctx.createRadialGradient(0, bob-s*1.1, 0, 0, bob-s*1.1, s*0.38);
        thG.addColorStop(0,'#005050'); thG.addColorStop(1,'#002020');
        ctx.fillStyle = thG; ctx.beginPath(); ctx.ellipse(0, bob-s*1.0, s*0.38, s*0.28, 0, 0, Math.PI*2); ctx.fill();
        const hdG = ctx.createRadialGradient(0, bob-s*1.45, 0, 0, bob-s*1.45, s*0.32);
        hdG.addColorStop(0,'#007060'); hdG.addColorStop(1,'#003030');
        ctx.fillStyle = hdG; ctx.beginPath(); ctx.arc(0, bob-s*1.42, s*0.3, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#FFEE00'; ctx.beginPath(); ctx.arc(-s*0.14, bob-s*1.48, s*0.1, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#FFEE00'; ctx.beginPath(); ctx.arc(s*0.14, bob-s*1.48, s*0.1, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(-s*0.14, bob-s*1.48, s*0.05, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(s*0.14, bob-s*1.48, s*0.05, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#003030'; ctx.lineWidth = 0.9;
        ctx.beginPath(); ctx.moveTo(-s*0.1, bob-s*1.68);
        ctx.quadraticCurveTo(-s*0.4+Math.sin(this.antennaPhase)*s*0.2, bob-s*2.1, -s*0.5+Math.sin(this.antennaPhase)*s*0.3, bob-s*2.35); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(s*0.1, bob-s*1.68);
        ctx.quadraticCurveTo(s*0.4+Math.cos(this.antennaPhase)*s*0.2, bob-s*2.1, s*0.5+Math.cos(this.antennaPhase)*s*0.3, bob-s*2.35); ctx.stroke();
        ctx.fillStyle = '#FFEE00'; ctx.beginPath(); ctx.arc(-s*0.5+Math.sin(this.antennaPhase)*s*0.3, bob-s*2.35, s*0.07, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#FFEE00'; ctx.beginPath(); ctx.arc(s*0.5+Math.cos(this.antennaPhase)*s*0.3, bob-s*2.35, s*0.07, 0, Math.PI*2); ctx.fill();
    }

    _ladybug(ctx, s, bob) {
        for (let side of [-1,1]) {
            for (let i = 0; i < 3; i++) {
                const lx = (i - 1) * s * 0.35, ly = bob + s * 0.3;
                const swing = Math.sin(this.legPhase + i * 1.2 + (side > 0 ? Math.PI : 0)) * s * 0.4;
                ctx.strokeStyle = '#1A0000'; ctx.lineWidth = 1.3;
                ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(lx + side * s * 0.55, ly + s * 0.4 + swing); ctx.stroke();
            }
        }
        const shellG = ctx.createRadialGradient(-s*0.2, bob-s*0.3, 0, 0, bob, s*1.0);
        shellG.addColorStop(0,'#FF6060'); shellG.addColorStop(0.5,'#E00000'); shellG.addColorStop(1,'#880000');
        ctx.fillStyle = shellG; ctx.beginPath(); ctx.ellipse(0, bob, s*0.78, s*0.92, 0, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.lineWidth = 1.2;
        ctx.beginPath(); ctx.moveTo(0, bob-s*0.9); ctx.lineTo(0, bob+s*0.9); ctx.stroke();
        const spots = [{x:-0.28,y:-0.45,r:0.14},{x:0.3,y:-0.5,r:0.12},{x:-0.32,y:0.05,r:0.13},{x:0.34,y:0.0,r:0.15},{x:-0.18,y:0.52,r:0.1},{x:0.22,y:0.5,r:0.1}];
        for (let sp of spots) { ctx.fillStyle = '#1A0000'; ctx.beginPath(); ctx.arc(sp.x*s, bob+sp.y*s, sp.r*s, 0, Math.PI*2); ctx.fill(); }
        const gloss = ctx.createRadialGradient(-s*0.25, bob-s*0.4, 0, -s*0.25, bob-s*0.4, s*0.6);
        gloss.addColorStop(0,'rgba(255,255,255,0.5)'); gloss.addColorStop(1,'rgba(255,255,255,0)');
        ctx.fillStyle = gloss; ctx.beginPath(); ctx.ellipse(0, bob, s*0.78, s*0.92, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(0, bob-s*1.02, s*0.32, 0, Math.PI*2); ctx.fill();
        for (let ex of [-0.16,0.16]) {
            ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(ex*s, bob-s*1.08, s*0.12, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(ex*s, bob-s*1.08, s*0.06, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(ex*s-s*0.02, bob-s*1.11, s*0.025, 0, Math.PI*2); ctx.fill();
        }
        ctx.strokeStyle = '#333'; ctx.lineWidth = 0.8;
        ctx.beginPath(); ctx.moveTo(-s*0.1, bob-s*1.3); ctx.lineTo(-s*0.35+Math.sin(this.antennaPhase)*s*0.1, bob-s*1.7); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(s*0.1, bob-s*1.3); ctx.lineTo(s*0.35+Math.cos(this.antennaPhase)*s*0.1, bob-s*1.7); ctx.stroke();
        ctx.fillStyle = '#DD0000'; ctx.beginPath(); ctx.arc(-s*0.35+Math.sin(this.antennaPhase)*s*0.1, bob-s*1.7, s*0.08, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#DD0000'; ctx.beginPath(); ctx.arc(s*0.35+Math.cos(this.antennaPhase)*s*0.1, bob-s*1.7, s*0.08, 0, Math.PI*2); ctx.fill();
    }

    _fireAnt(ctx, s, bob) {
        for (let side of [-1,1]) {
            for (let i = 0; i < 3; i++) {
                const lx = [-0.5, 0, 0.45][i] * s;
                const swing = Math.sin(this.legPhase + i * 2.1 + (side > 0 ? 0 : Math.PI)) * s * 0.55;
                ctx.strokeStyle = '#7A2000'; ctx.lineWidth = 1.1;
                ctx.beginPath(); ctx.moveTo(lx, bob); ctx.lineTo(lx + side * s * 0.7 + swing * 0.1, bob + s * 0.55 + swing); ctx.stroke();
            }
        }
        const gasG = ctx.createRadialGradient(0, bob+s*0.65, 0, 0, bob+s*0.65, s*0.55);
        gasG.addColorStop(0,'#FF5500'); gasG.addColorStop(0.5,'#CC2200'); gasG.addColorStop(1,'#880000');
        ctx.fillStyle = gasG; ctx.beginPath(); ctx.ellipse(0, bob+s*0.6, s*0.42, s*0.58, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = 'rgba(255,200,150,0.3)'; ctx.beginPath(); ctx.ellipse(-s*0.1, bob+s*0.35, s*0.18, s*0.22, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#AA2000'; ctx.beginPath(); ctx.arc(0, bob, s*0.14, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#BB2500'; ctx.beginPath(); ctx.arc(0, bob-s*0.22, s*0.13, 0, Math.PI*2); ctx.fill();
        const thG = ctx.createRadialGradient(0, bob-s*0.55, 0, 0, bob-s*0.55, s*0.32);
        thG.addColorStop(0,'#FF4400'); thG.addColorStop(1,'#992200');
        ctx.fillStyle = thG; ctx.beginPath(); ctx.ellipse(0, bob-s*0.52, s*0.3, s*0.35, 0, 0, Math.PI*2); ctx.fill();
        const hG = ctx.createRadialGradient(0, bob-s*1.0, 0, 0, bob-s*1.0, s*0.32);
        hG.addColorStop(0,'#FF5500'); hG.addColorStop(1,'#881100');
        ctx.fillStyle = hG; ctx.beginPath(); ctx.arc(0, bob-s*1.0, s*0.3, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#550000'; ctx.lineWidth = 1.2;
        ctx.beginPath(); ctx.moveTo(-s*0.18, bob-s*1.25); ctx.lineTo(-s*0.38+Math.sin(this.legPhase)*s*0.08, bob-s*1.42); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(s*0.18, bob-s*1.25); ctx.lineTo(s*0.38+Math.sin(this.legPhase+Math.PI)*s*0.08, bob-s*1.42); ctx.stroke();
        ctx.fillStyle = '#FFCC00'; ctx.beginPath(); ctx.arc(-s*0.13, bob-s*1.05, s*0.09, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#FFCC00'; ctx.beginPath(); ctx.arc(s*0.13, bob-s*1.05, s*0.09, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#1A0000'; ctx.beginPath(); ctx.arc(-s*0.13, bob-s*1.05, s*0.05, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#1A0000'; ctx.beginPath(); ctx.arc(s*0.13, bob-s*1.05, s*0.05, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#550000'; ctx.lineWidth = 0.9;
        for (let side of [-1,1]) {
            ctx.beginPath(); ctx.moveTo(side*s*0.1, bob-s*1.28);
            ctx.lineTo(side*s*0.3, bob-s*1.6);
            ctx.lineTo(side*(s*0.3+Math.sin(this.antennaPhase+side)*s*0.25), bob-s*1.9); ctx.stroke();
        }
    }

    _tarantula(ctx, s, bob) {
        const legAngles = [-2.2,-1.4,-0.6,0.2,Math.PI+2.2,Math.PI+1.4,Math.PI+0.6,Math.PI-0.2];
        for (let i = 0; i < 8; i++) {
            const a = legAngles[i];
            const swing = Math.sin(this.legPhase + i * 0.8) * s * 0.4;
            const kx = Math.cos(a)*s*0.7, ky = Math.sin(a)*s*0.55+bob;
            const fx = Math.cos(a)*s*1.5+swing*Math.sin(a), fy = Math.sin(a)*s*1.4+bob+swing*Math.cos(a);
            ctx.strokeStyle = '#3A2010'; ctx.lineWidth = s*0.18; ctx.lineCap = 'round';
            ctx.beginPath(); ctx.moveTo(Math.cos(a)*s*0.5, Math.sin(a)*s*0.5+bob); ctx.lineTo(kx, ky); ctx.stroke();
            ctx.strokeStyle = '#2A1808'; ctx.lineWidth = s*0.13;
            ctx.beginPath(); ctx.moveTo(kx, ky); ctx.lineTo(fx, fy); ctx.stroke();
            ctx.strokeStyle = 'rgba(80,50,20,0.5)'; ctx.lineWidth = 0.5;
            for (let h = 0; h < 3; h++) {
                const hx = kx+(fx-kx)*(h/3), hy = ky+(fy-ky)*(h/3);
                ctx.beginPath(); ctx.moveTo(hx, hy); ctx.lineTo(hx+Math.sin(a)*s*0.12, hy-Math.cos(a)*s*0.12); ctx.stroke();
            }
        }
        ctx.lineCap = 'butt';
        const abdG = ctx.createRadialGradient(-s*0.15, bob+s*0.5, 0, 0, bob+s*0.6, s*0.8);
        abdG.addColorStop(0,'#5A3820'); abdG.addColorStop(0.6,'#3A2010'); abdG.addColorStop(1,'#1E0E06');
        ctx.fillStyle = abdG; ctx.beginPath(); ctx.ellipse(0, bob+s*0.55, s*0.62, s*0.75, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = 'rgba(200,80,0,0.45)';
        ctx.beginPath(); ctx.ellipse(0, bob+s*0.3, s*0.2, s*0.22, 0, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(0, bob+s*0.75, s*0.18, s*0.2, 0, 0, Math.PI*2); ctx.fill();
        const cepG = ctx.createRadialGradient(-s*0.1, bob-s*0.1, 0, 0, bob, s*0.6);
        cepG.addColorStop(0,'#6A4828'); cepG.addColorStop(1,'#2A1408');
        ctx.fillStyle = cepG; ctx.beginPath(); ctx.ellipse(0, bob, s*0.52, s*0.62, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = 'rgba(100,60,20,0.2)';
        for (let i = 0; i < 6; i++) { ctx.beginPath(); ctx.arc((Math.random()-0.5)*s*0.8, bob+(Math.random()-0.5)*s*0.9, s*0.08, 0, Math.PI*2); ctx.fill(); }
        const eyePos = [{x:-0.22,y:-0.72},{x:0.22,y:-0.72},{x:-0.1,y:-0.6},{x:0.1,y:-0.6},{x:-0.32,y:-0.58},{x:0.32,y:-0.58},{x:-0.18,y:-0.48},{x:0.18,y:-0.48}];
        for (let e of eyePos) {
            ctx.fillStyle = 'rgba(200,230,255,0.9)'; ctx.beginPath(); ctx.arc(e.x*s, bob+e.y*s, s*0.07, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(e.x*s, bob+e.y*s, s*0.04, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.beginPath(); ctx.arc(e.x*s-s*0.015, bob+e.y*s-s*0.015, s*0.018, 0, Math.PI*2); ctx.fill();
        }
        ctx.fillStyle = '#1A0A00';
        ctx.beginPath(); ctx.ellipse(-s*0.14, bob-s*0.88, s*0.08, s*0.18, 0.2, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(s*0.14, bob-s*0.88, s*0.08, s*0.18, -0.2, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = 'rgba(0,200,100,0.7)';
        ctx.beginPath(); ctx.arc(-s*0.14, bob-s*1.02, s*0.06, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(s*0.14, bob-s*1.02, s*0.06, 0, Math.PI*2); ctx.fill();
    }

    _caterpillar(ctx, s, bob) {
        const segs = 7;
        const colors = ['#44AA22','#55CC33','#33991A','#66DD44','#33991A','#55CC33','#44AA22'];
        const glows = ['#88EE55','#AAFFAA','#66CC33','#99FF66','#66CC33','#AAFFAA','#88EE55'];
        for (let i = segs-1; i >= 0; i--) {
            const segX = (i-(segs-1)/2)*s*0.42;
            const segY = bob+Math.sin(this.legPhase+i*0.9)*s*0.18;
            const r = s*(0.3+Math.sin(i*0.5)*0.07);
            ctx.fillStyle = 'rgba(0,0,0,0.15)';
            ctx.beginPath(); ctx.ellipse(segX+s*0.04, segY+r*0.7, r*0.9, r*0.22, 0, 0, Math.PI*2); ctx.fill();
            const sG = ctx.createRadialGradient(segX-r*0.3, segY-r*0.3, 0, segX, segY, r);
            sG.addColorStop(0, glows[i]); sG.addColorStop(0.5, colors[i]); sG.addColorStop(1, '#1A5500');
            ctx.fillStyle = sG; ctx.beginPath(); ctx.arc(segX, segY, r, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = 'rgba(0,60,0,0.35)'; ctx.lineWidth = 0.8;
            ctx.beginPath(); ctx.arc(segX, segY, r, 0, Math.PI*2); ctx.stroke();
            if (i < segs-1) {
                for (let side of [-1,1]) {
                    ctx.fillStyle = '#2A7A00';
                    ctx.beginPath(); ctx.ellipse(segX+side*r*0.75, segY+r*0.7, r*0.2, r*0.3, 0, 0, Math.PI*2); ctx.fill();
                }
            }
        }
        const hx = (0-(segs-1)/2)*s*0.42;
        const hy = bob+Math.sin(this.legPhase)*s*0.18;
        const hG = ctx.createRadialGradient(hx-s*0.15, hy-s*0.15, 0, hx, hy, s*0.38);
        hG.addColorStop(0,'#AAFFAA'); hG.addColorStop(0.5,'#55CC33'); hG.addColorStop(1,'#1A6600');
        ctx.fillStyle = hG; ctx.beginPath(); ctx.arc(hx, hy, s*0.38, 0, Math.PI*2); ctx.fill();
        for (let ex of [-0.18,0.18]) {
            ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(hx+ex*s, hy-s*0.12, s*0.12, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(hx+ex*s, hy-s*0.12, s*0.07, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(hx+ex*s-s*0.02, hy-s*0.15, s*0.025, 0, Math.PI*2); ctx.fill();
        }
        ctx.strokeStyle = '#1A6600'; ctx.lineWidth = 0.9;
        ctx.beginPath(); ctx.arc(hx, hy+s*0.02, s*0.15, 0.3, Math.PI-0.3); ctx.stroke();
        ctx.strokeStyle = '#1A6600'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(hx-s*0.1, hy-s*0.34);
        ctx.quadraticCurveTo(hx-s*0.3, hy-s*0.7, hx-s*0.25+Math.sin(this.antennaPhase)*s*0.12, hy-s*0.9); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(hx+s*0.1, hy-s*0.34);
        ctx.quadraticCurveTo(hx+s*0.3, hy-s*0.7, hx+s*0.25+Math.cos(this.antennaPhase)*s*0.12, hy-s*0.9); ctx.stroke();
        ctx.fillStyle = '#FFDD00'; ctx.beginPath(); ctx.arc(hx-s*0.25+Math.sin(this.antennaPhase)*s*0.12, hy-s*0.9, s*0.09, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#FFDD00'; ctx.beginPath(); ctx.arc(hx+s*0.25+Math.cos(this.antennaPhase)*s*0.12, hy-s*0.9, s*0.09, 0, Math.PI*2); ctx.fill();
    }

    _dragonfly(ctx, s, bob) {
        const wFlap = Math.sin(this.wingPhase)*s*0.12;
        for (let pair of [{y:-0.1,len:1.8,wide:0.55},{y:0.35,len:1.5,wide:0.45}]) {
            for (let side of [-1,1]) {
                const wG = ctx.createLinearGradient(0, bob+pair.y*s, side*s*pair.len, bob+pair.y*s);
                wG.addColorStop(0,'rgba(180,240,255,0.0)'); wG.addColorStop(0.2,'rgba(140,220,255,0.7)');
                wG.addColorStop(0.6,'rgba(100,200,255,0.55)'); wG.addColorStop(1,'rgba(80,180,240,0.2)');
                ctx.fillStyle = wG; ctx.beginPath(); ctx.moveTo(0, bob+pair.y*s);
                ctx.bezierCurveTo(side*s*pair.len*0.3, bob+(pair.y-pair.wide)*s+wFlap*side, side*s*pair.len*0.9, bob+(pair.y-pair.wide*0.8)*s+wFlap*side, side*s*pair.len, bob+pair.y*s);
                ctx.bezierCurveTo(side*s*pair.len*0.9, bob+(pair.y+pair.wide*0.3)*s, side*s*pair.len*0.3, bob+(pair.y+pair.wide*0.2)*s, 0, bob+pair.y*s); ctx.fill();
                ctx.strokeStyle = 'rgba(100,180,220,0.4)'; ctx.lineWidth = 0.5;
                ctx.beginPath(); ctx.moveTo(0, bob+pair.y*s); ctx.lineTo(side*s*pair.len*0.6, bob+(pair.y-pair.wide*0.5)*s+wFlap*side*0.5); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(side*s*pair.len*0.3, bob+(pair.y-pair.wide*0.4)*s); ctx.lineTo(side*s*pair.len*0.7, bob+pair.y*s); ctx.stroke();
            }
        }
        const abdColors = ['#0066AA','#0088CC','#00AAEE','#0099DD','#0077BB','#006699','#0055AA','#004488'];
        for (let i = 7; i >= 0; i--) {
            const ty = bob+s*(0.35+i*0.32), tr = s*(0.22-i*0.018);
            const tilt = Math.sin(this.wobble*0.5+i*0.4)*s*0.06;
            const aG = ctx.createRadialGradient(tilt-tr*0.3, ty-tr*0.3, 0, tilt, ty, tr);
            aG.addColorStop(0,'#55DDFF'); aG.addColorStop(0.5, abdColors[i]||'#003366'); aG.addColorStop(1,'#001A44');
            ctx.fillStyle = aG; ctx.beginPath(); ctx.arc(tilt, ty, tr, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = 'rgba(0,80,150,0.4)'; ctx.lineWidth = 0.5;
            ctx.beginPath(); ctx.arc(tilt, ty, tr, 0, Math.PI*2); ctx.stroke();
        }
        const txG = ctx.createRadialGradient(-s*0.1, bob, 0, 0, bob, s*0.42);
        txG.addColorStop(0,'#44CCFF'); txG.addColorStop(0.5,'#0088CC'); txG.addColorStop(1,'#003366');
        ctx.fillStyle = txG; ctx.beginPath(); ctx.ellipse(0, bob, s*0.32, s*0.42, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#0077BB'; ctx.beginPath(); ctx.arc(0, bob-s*0.52, s*0.3, 0, Math.PI*2); ctx.fill();
        for (let side of [-1,1]) {
            const eG = ctx.createRadialGradient(side*s*0.22, bob-s*0.55, 0, side*s*0.22, bob-s*0.55, s*0.22);
            eG.addColorStop(0,'#AAFFEE'); eG.addColorStop(0.4,'#00EECC'); eG.addColorStop(1,'#004433');
            ctx.fillStyle = eG; ctx.beginPath(); ctx.arc(side*s*0.22, bob-s*0.55, s*0.22, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = 'rgba(0,100,80,0.5)'; ctx.lineWidth = 0.5;
            ctx.beginPath(); ctx.arc(side*s*0.22, bob-s*0.55, s*0.22, 0, Math.PI*2); ctx.stroke();
            ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.arc(side*s*0.22, bob-s*0.55, s*0.12, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = 'rgba(180,255,240,0.6)'; ctx.beginPath(); ctx.arc(side*s*0.18, bob-s*0.62, s*0.06, 0, Math.PI*2); ctx.fill();
        }
        ctx.fillStyle = 'rgba(100,220,255,0.25)'; ctx.beginPath(); ctx.arc(-s*0.06, bob-s*0.6, s*0.15, 0, Math.PI*2); ctx.fill();
    }

    squish() {
        if (!this.alive) return;
        this.alive = false;
        for (let i = 0; i < 18; i++) {
            particles.push({
                x: this.x, y: this.y,
                vx: (Math.random() - 0.5) * 9, vy: (Math.random() - 0.5) * 7 - 2,
                life: 1, color: this.isWarning ? '#FFD040' : '#88FF44',
                size: 2 + Math.random() * 5, isSplat: i < 5
            });
        }
        killed++; kc.textContent = killed;
        combo++; comboTimer = 40;
        comboEl.textContent = combo > 1 ? combo + 'x' : '0';
        setTimeout(() => {
            bugs = bugs.filter(b => b !== this);
            const tot = errorTarget + warningTarget;
            while (bugs.length < tot) bugs.push(new Bug(undefined, bugs.length >= errorTarget));
            updateCountDisplay();
        }, 400);
        try { vscode.postMessage({ command: 'bugKilled', points: this.isWarning ? 5 : 10 }); } catch (e) {}
    }

    contains(px, py) {
        return Math.abs(px - this.x) < this.size * 1.5 && Math.abs(py - this.y) < this.size * 1.5;
    }
}

// DRAW ENVIRONMENT
// ============================================================
function drawEnv() {
    const t = frame * 0.007;
    const sky = ctx.createLinearGradient(0, 0, 0, H * 0.8);
    sky.addColorStop(0,'#FF4500'); sky.addColorStop(0.12,'#FF6B00');
    sky.addColorStop(0.28,'#FF9500'); sky.addColorStop(0.45,'#FFB347');
    sky.addColorStop(0.62,'#FFD580'); sky.addColorStop(0.78,'#FFE8A0');
    sky.addColorStop(1,'#FFF0C0');
    ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);
    const sunX = W * 0.5, sunY = H * 0.72;
    const sunHalo = ctx.createRadialGradient(sunX, sunY, 20, sunX, sunY, W * 0.55);
    sunHalo.addColorStop(0,'rgba(255,230,50,0.55)'); sunHalo.addColorStop(0.3,'rgba(255,140,0,0.25)');
    sunHalo.addColorStop(0.7,'rgba(255,80,0,0.08)'); sunHalo.addColorStop(1,'rgba(255,0,0,0)');
    ctx.fillStyle = sunHalo; ctx.fillRect(0, 0, W, H);
    ctx.save(); ctx.beginPath(); ctx.rect(0, 0, W, H * 0.76); ctx.clip();
    const sunG = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 70);
    sunG.addColorStop(0,'#FFFDE0'); sunG.addColorStop(0.25,'#FFF080');
    sunG.addColorStop(0.6,'#FFD020'); sunG.addColorStop(1,'#FF8800');
    ctx.fillStyle = sunG; ctx.beginPath(); ctx.arc(sunX, sunY, 70, 0, Math.PI * 2); ctx.fill(); ctx.restore();
    ctx.save();
    for (let i = 0; i < 16; i++) {
        const a = (i/16)*Math.PI*2 + t*0.15;
        const len = 160 + Math.sin(t*2+i)*40;
        ctx.strokeStyle = `rgba(255,240,100,${0.04+Math.sin(t+i)*0.015})`;
        ctx.lineWidth = 18 + i*2;
        ctx.beginPath();
        ctx.moveTo(sunX + Math.cos(a)*72, sunY + Math.sin(a)*72);
        ctx.lineTo(sunX + Math.cos(a)*len, sunY + Math.sin(a)*len); ctx.stroke();
    }
    ctx.restore();
    for (let cl of CLOUDS) { cl.rx += cl.speed / W; if (cl.rx > 1.2) cl.rx = -0.15; drawSunsetCloud(cl.rx * W, cl.y, cl.s, cl.alpha); }
    ctx.save(); ctx.fillStyle = 'rgba(80,20,60,0.65)';
    drawHillShape([0,0.1,0.22,0.35,0.48,0.62,0.75,0.88,1],[0.78,0.68,0.75,0.65,0.74,0.64,0.73,0.67,0.78]); ctx.restore();
    ctx.save(); ctx.fillStyle = 'rgba(40,12,20,0.80)';
    drawHillShape([0,0.07,0.18,0.3,0.43,0.55,0.68,0.8,0.92,1],[0.82,0.74,0.80,0.72,0.81,0.73,0.79,0.74,0.81,0.82]); ctx.restore();
    for (let td of [{rx:0.02,h:0.42},{rx:0.08,h:0.36},{rx:0.15,h:0.45},{rx:0.22,h:0.33},{rx:0.78,h:0.38},{rx:0.85,h:0.46},{rx:0.91,h:0.35},{rx:0.97,h:0.42}]) drawPineTree(td.rx*W, H*0.83, td.h*H);
    ctx.save();
    const grd = ctx.createLinearGradient(0, H*0.76, 0, H);
    grd.addColorStop(0,'#2D5A0A'); grd.addColorStop(0.25,'#1E4006'); grd.addColorStop(0.6,'#142D04'); grd.addColorStop(1,'#0C1E02');
    ctx.fillStyle = grd; ctx.beginPath(); ctx.moveTo(0, H);
    for (let pt of terrainPts) ctx.lineTo(pt.x, pt.y);
    ctx.lineTo(W, H); ctx.closePath(); ctx.fill();
    const grefl = ctx.createLinearGradient(0, H*0.76, 0, H*0.88);
    grefl.addColorStop(0,'rgba(255,160,30,0.22)'); grefl.addColorStop(1,'rgba(255,100,0,0)');
    ctx.fillStyle = grefl; ctx.fillRect(0, H*0.76, W, H*0.12); ctx.restore();
    ctx.fillStyle = 'rgba(80,45,10,0.4)';
    ctx.beginPath(); ctx.ellipse(W*0.2, H*0.85, 30, 8, 0.1, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(W*0.72, H*0.87, 22, 6, -0.1, 0, Math.PI*2); ctx.fill();
    for (let g of GRASS) {
        const baseY = H*0.8+Math.sin(g.x*0.05)*15;
        const sway = Math.sin(t*1.1+g.phase)*g.h*0.3+Math.sin(t*1.9+g.phase*1.3)*g.h*0.08;
        const dark = 0.2+g.bright*0.3;
        let r,gr,b;
        if(g.layer===0){r=10;gr=50;b=5}else if(g.layer===1){r=20;gr=80;b=10}else{r=40;gr=120;b=15}
        const bladG = ctx.createLinearGradient(g.x, baseY, g.x+sway, baseY-g.h);
        bladG.addColorStop(0,`rgba(${r},${gr},${b},${dark+0.4})`);
        bladG.addColorStop(0.6,`rgba(${r+20},${gr+40},${b+5},${dark+0.3})`);
        bladG.addColorStop(1,`rgba(${r+50},${gr+100},${b+10},${dark})`);
        ctx.strokeStyle = bladG; ctx.lineWidth = g.w;
        ctx.beginPath(); ctx.moveTo(g.x, baseY);
        ctx.quadraticCurveTo(g.x+sway*0.4, baseY-g.h*0.5, g.x+sway, baseY-g.h); ctx.stroke();
    }
    for (let f of flowers) {
        const fx = f.rx*W, fy = f.rootY, sw = Math.sin(t*0.9+f.phase)*4, tx = fx+sw, ty = fy-f.stem;
        ctx.strokeStyle = '#2A5A0A'; ctx.lineWidth = 1.3;
        ctx.beginPath(); ctx.moveTo(fx, fy); ctx.quadraticCurveTo(fx+sw*0.5, fy-f.stem*0.5, tx, ty); ctx.stroke();
        if (f.stem > 50) { ctx.fillStyle = '#3A7010'; ctx.save(); ctx.translate(fx+sw*0.3, fy-f.stem*0.4); ctx.rotate(Math.PI/5); ctx.beginPath(); ctx.ellipse(5,0,8,3,0,0,Math.PI*2); ctx.fill(); ctx.restore(); }
        ctx.save(); ctx.globalAlpha = 0.25;
        for (let p=0;p<f.n;p++){const a=p*(Math.PI*2/f.n)+0.3;ctx.fillStyle='#000';ctx.save();ctx.translate(tx+2,ty+3);ctx.rotate(a);ctx.beginPath();ctx.ellipse(f.size*0.55,0,f.size*0.45,f.size*0.22,0,0,Math.PI*2);ctx.fill();ctx.restore();}ctx.restore();
        for (let p=0;p<f.n;p++){const a=p*(Math.PI*2/f.n)+f.phase*0.05;ctx.fillStyle=f.pal.p;ctx.save();ctx.translate(tx,ty);ctx.rotate(a);ctx.beginPath();ctx.ellipse(f.size*0.55,0,f.size*0.45,f.size*0.22,0,0,Math.PI*2);ctx.fill();ctx.fillStyle=f.pal.l;ctx.globalAlpha=0.5;ctx.beginPath();ctx.ellipse(f.size*0.45,-f.size*0.05,f.size*0.18,f.size*0.08,0,0,Math.PI*2);ctx.fill();ctx.restore();}
        ctx.fillStyle = f.pal.c; ctx.beginPath(); ctx.arc(tx, ty, f.size*0.28, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.beginPath(); ctx.arc(tx-f.size*0.08, ty-f.size*0.08, f.size*0.08, 0, Math.PI*2); ctx.fill();
    }
    for (let i = 0; i < 6; i++) {
        const mx = W*((Math.sin(t*0.3+i*1.7)*0.5+0.5)*0.6+0.2), my = H*(0.15+Math.sin(t*0.2+i*2.3)*0.3);
        const alpha = 0.3+0.4*Math.abs(Math.sin(t*1.2+i));
        ctx.fillStyle = `rgba(255,240,100,${alpha})`; ctx.beginPath(); ctx.arc(mx, my, 1.5, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = `rgba(255,220,80,${alpha*0.5})`; ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.moveTo(mx-4,my);ctx.lineTo(mx+4,my);ctx.moveTo(mx,my-4);ctx.lineTo(mx,my+4);ctx.stroke();
    }
}

function drawSunsetCloud(x,y,s,alpha){ctx.save();ctx.globalAlpha=alpha*0.5;ctx.fillStyle='rgba(160,80,20,0.6)';const arcs=[{x:0,y:4,r:26},{x:22,y:-5,r:19},{x:-20,y:-3,r:16},{x:38,y:2,r:21},{x:-36,y:4,r:15},{x:14,y:-14,r:13}];for(let a of arcs){ctx.beginPath();ctx.arc(x+a.x*s,y+a.y*s+4,a.r*s,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=alpha;ctx.fillStyle='rgba(255,210,140,0.92)';for(let a of arcs){ctx.beginPath();ctx.arc(x+a.x*s,y+a.y*s,a.r*s,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=alpha*0.6;ctx.fillStyle='rgba(255,255,220,0.9)';for(let a of[{x:0,y:0,r:26},{x:22,y:-5,r:19}]){ctx.beginPath();ctx.arc(x+a.x*s,y+a.y*s-a.r*s*0.4,a.r*s*0.6,0,Math.PI*2);ctx.fill()}ctx.restore()}
function drawHillShape(xs,ys){ctx.beginPath();ctx.moveTo(0,H);for(let i=0;i<xs.length;i++){if(i===0)ctx.moveTo(xs[i]*W,ys[i]*H);else ctx.bezierCurveTo(xs[i-1]*W+(xs[i]-xs[i-1])*W*.5,ys[i-1]*H,xs[i]*W-(xs[i]-xs[i-1])*W*.5,ys[i]*H,xs[i]*W,ys[i]*H)}ctx.lineTo(W,H);ctx.closePath();ctx.fill()}
function drawPineTree(x,gy,h){ctx.save();ctx.fillStyle='rgba(15,8,5,0.85)';ctx.fillRect(x-3,gy-h*.22,6,h*.22);for(let i=0;i<6;i++){const ty=gy-h*.18-(h*.82)*(i/6),tw=h*.18*(1-i/6*.65);ctx.beginPath();ctx.moveTo(x,ty-h*.18);ctx.lineTo(x+tw,ty);ctx.lineTo(x-tw,ty);ctx.closePath();ctx.fill()}ctx.restore()}

function updateParticles(){for(let p of particles){p.x+=p.vx;p.y+=p.vy;if(!p.isSplat)p.vy+=0.1;p.life-=0.025}particles=particles.filter(p=>p.life>0)}
function drawParticles(){for(let p of particles){ctx.save();ctx.globalAlpha=p.life;ctx.fillStyle=p.color;if(p.isSplat){ctx.beginPath();ctx.ellipse(p.x,p.y,p.size*2,p.size*.5,0,0,Math.PI*2);ctx.fill()}else{ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill()}ctx.restore()}}

function updateCountDisplay(){errCountEl.textContent=errorTarget;warnCountEl.textContent=warningTarget}
function setTargets(errors,warnings){errorTarget=errors;warningTarget=warnings;const tot=errors+warnings;bugs=bugs.filter(b=>b.alive);while(bugs.length>tot){const b=bugs.pop();if(b)b.alive=false}while(bugs.length<tot)bugs.push(new Bug(undefined,bugs.length>=errors));updateCountDisplay()}

function gameLoop(){frame++;if(comboTimer>0){comboTimer--;if(!comboTimer){combo=0;comboEl.textContent='0'}}updateParticles();ctx.clearRect(0,0,W,H);drawEnv();for(let b of bugs){b.update();b.draw(ctx)}drawParticles();requestAnimationFrame(gameLoop)}

canvas.addEventListener('click',e=>{const r=canvas.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;for(let i=bugs.length-1;i>=0;i--){if(bugs[i].alive&&bugs[i].contains(mx,my)){bugs[i].squish();break}}});
window.addEventListener('message',e=>{if(e.data.command==='setTargets')setTargets(e.data.errors,e.data.warnings)});

resize();
try{const vscode=acquireVsCodeApi();vscode.postMessage({command:'ready'});}catch(e){}
gameLoop();
</script>
