<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100vh; overflow: hidden;
            background: #1e1e1e;
            font-family: 'Georgia', serif;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 36 36"><text y="32" font-size="32">🩴</text></svg>') 18 4, auto;
        }
        #area { display: flex; flex-direction: column; width: 100%; height: 100%; }
        #hdr {
            text-align: center; padding: 7px 12px;
            background: #2d2d2d;
            color: #FFD080; font-size: 13px; font-weight: bold; letter-spacing: 4px;
            border-bottom: 2px solid #FF6600; z-index: 10;
        }
        #info {
            text-align: center; padding: 4px 8px; font-size: 10px;
            color: #FFE0A0; background: #252525;
            border-bottom: 1px solid #444; z-index: 10; letter-spacing: 1px;
        }
        #info .red { color: #FF6060; }
        #info .yellow { color: #FFD040; }
        canvas { flex-grow: 1; display: block; }
    </style>
</head>
<body>
<div id="area">
    <div id="hdr">🪵 MUD GROUND 🩴</div>
    <div id="info">
        <span class="red">🔴 Errors: <b id="errCount">0</b></span> |
        <span class="yellow">🟡 Warnings: <b id="warnCount">0</b></span> |
        🩴 Killed: <b id="kc">0</b> | ⚡ Combo: <b id="combo">0</b>
    </div>
    <canvas id="c"></canvas>
</div>

<script src="bugs/beetle.js"></script>
<script src="bugs/ladybug.js"></script>
<script src="bugs/fire-ant.js"></script>
<script src="bugs/spider.js"></script>
<script src="bugs/caterpillar.js"></script>
<script src="bugs/dragonfly.js"></script>
<script src="bugs/bug-registry.js"></script>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const errCountEl = document.getElementById('errCount');
const warnCountEl = document.getElementById('warnCount');
const kc = document.getElementById('kc');
const comboEl = document.getElementById('combo');

let W, H, frame = 0;
let mouse = { x: -999, y: -999 };
let bugs = [], killed = 0;
let errorTarget = 0, warningTarget = 0;
let combo = 0, comboTimer = 0, particles = [];

function resize() { W = canvas.width = canvas.clientWidth; H = canvas.height = canvas.clientHeight; }
window.addEventListener('resize', resize);
canvas.addEventListener('mousemove', e => { const r = canvas.getBoundingClientRect(); mouse.x = e.clientX - r.left; mouse.y = e.clientY - r.top; });

class Bug {
    constructor(type, isWarning) {
        this.type = type !== undefined ? type : Math.floor(Math.random() * bugTypes.length);
        this.bug = bugTypes[this.type];
        this.isWarning = isWarning || false;
        this.canFly = this.bug.canFly !== undefined ? this.bug.canFly : true;
        this.x = 30 + Math.random() * (W - 60);
        this.y = 30 + Math.random() * (H - 60);
        this.vx = (Math.random() - 0.5) * this.bug.speed;
        this.vy = (Math.random() - 0.5) * this.bug.speed;
        this.size = this.isWarning ? this.bug.size * 0.7 + Math.random() * 3 : this.bug.size + Math.random() * 4;
        this.alive = true;
        this.legPhase = Math.random() * Math.PI * 2;
        this.antennaPhase = Math.random() * Math.PI * 2;
        this.wingPhase = Math.random() * Math.PI * 2;
        this.fleeTimer = 0;
        this.wobble = Math.random() * Math.PI * 2;
        this.trail = [];
    }

    update() {
        if (!this.alive) return;
        const dx = mouse.x - this.x, dy = mouse.y - this.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const fleeing = dist < 90;
        if (fleeing) { this.fleeTimer = 25; this.vx -= (dx / dist) * 0.6; this.vy -= (dy / dist) * 0.6; }
        if (this.fleeTimer > 0) this.fleeTimer--;
        this.x += this.vx; this.y += this.vy;
        this.wobble += 0.06; this.legPhase += 0.28 * this.bug.speed;
        this.antennaPhase += 0.12; this.wingPhase += 0.35;
        const spd = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
        if (spd > this.bug.speed * 2.5) { this.vx *= 0.88; this.vy *= 0.88; }
        if (this.x < 12 || this.x > W - 12) this.vx *= -1;
        if (this.y < 12 || this.y > H - 12) this.vy *= -1;
        this.x = Math.max(12, Math.min(W - 12, this.x));
        this.y = Math.max(12, Math.min(H - 12, this.y));
        if (Math.random() < 0.006 && !fleeing) { this.vx = (Math.random() - 0.5) * this.bug.speed; this.vy = (Math.random() - 0.5) * this.bug.speed; }
        if (this.type === 5 || fleeing) { this.trail.push({ x: this.x, y: this.y, a: 0.35 }); if (this.trail.length > 6) this.trail.shift(); for (let t of this.trail) t.a -= 0.04; }
    }

    draw(ctx) {
        if (!this.alive) return;
        for (let t of this.trail) { ctx.save(); ctx.globalAlpha = Math.max(0, t.a); ctx.fillStyle = this.isWarning ? '#FFD040' : '#88FFAA'; ctx.beginPath(); ctx.arc(t.x, t.y, this.size * 0.25, 0, Math.PI * 2); ctx.fill(); ctx.restore(); }
        ctx.save(); ctx.translate(this.x, this.y);
        const s = this.size, angle = Math.atan2(this.vy, this.vx);
        ctx.rotate(angle + Math.PI / 2);
        const bob = Math.sin(this.wobble) * 1.2, fleeing = this.fleeTimer > 0;
        ctx.save(); ctx.rotate(-(angle + Math.PI / 2));
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath(); ctx.ellipse(0, s * 0.7, s * 0.9, s * 0.18, 0, 0, Math.PI * 2); ctx.fill(); ctx.restore();
        if (this.isWarning && !fleeing) { ctx.strokeStyle = 'rgba(255,200,0,0.6)'; ctx.lineWidth = 1.2; ctx.setLineDash([4, 3]); ctx.beginPath(); ctx.arc(0, bob, s * 1.45, 0, Math.PI * 2); ctx.stroke(); ctx.setLineDash([]); }
        if (this.bug.draw) { this.bug.draw(ctx, s, bob, this); }
        if (fleeing) { ctx.strokeStyle = 'rgba(255,240,60,0.9)'; ctx.lineWidth = 2.5; ctx.beginPath(); ctx.arc(0, bob, s * 1.55, 0, Math.PI * 2); ctx.stroke(); for (let i = 0; i < 4; i++) { const a = i * Math.PI / 2; ctx.strokeStyle = 'rgba(255,255,120,0.5)'; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(Math.cos(a) * s * 1.6, Math.sin(a) * s * 1.6 + bob); ctx.lineTo(Math.cos(a) * s * 2.2, Math.sin(a) * s * 2.2 + bob); ctx.stroke(); } }
        ctx.restore();
    }

    squish() {
        if (!this.alive) return; this.alive = false;
        for (let i = 0; i < 18; i++) { particles.push({ x: this.x, y: this.y, vx: (Math.random() - 0.5) * 9, vy: (Math.random() - 0.5) * 7 - 2, life: 1, color: this.isWarning ? '#FFD040' : '#8B6914', size: 2 + Math.random() * 5, isSplat: i < 5 }); }
        killed++; kc.textContent = killed; combo++; comboTimer = 40; comboEl.textContent = combo > 1 ? combo + 'x' : '0';
        setTimeout(() => { bugs = bugs.filter(b => b !== this); const tot = errorTarget + warningTarget; while (bugs.length < tot) bugs.push(new Bug(undefined, bugs.length >= errorTarget)); updateCountDisplay(); }, 400);
        try { vscode.postMessage({ command: 'bugKilled', points: this.isWarning ? 5 : 10 }); } catch (e) {}
    }
    contains(px, py) { return Math.abs(px - this.x) < this.size * 1.5 && Math.abs(py - this.y) < this.size * 1.5; }
}

// ============================================================
// MUDDY BACKGROUND - Top to Bottom
// ============================================================
function drawEnv() {
    const t = frame * 0.005;
    
    // Full muddy gradient from top to bottom
    const mud = ctx.createLinearGradient(0, 0, 0, H);
    mud.addColorStop(0, '#5C3D1A');
    mud.addColorStop(0.2, '#6B4F28');
    mud.addColorStop(0.4, '#7A5C30');
    mud.addColorStop(0.6, '#6B4F28');
    mud.addColorStop(0.8, '#4A3508');
    mud.addColorStop(1, '#3A2805');
    ctx.fillStyle = mud;
    ctx.fillRect(0, 0, W, H);
    
    // Subtle mud texture dots
    for (let i = 0; i < 50; i++) {
        const sx = (Math.sin(i * 12.7 + t) * 0.5 + 0.5) * W;
        const sy = (Math.cos(i * 7.3 + t * 0.7) * 0.5 + 0.5) * H;
        ctx.fillStyle = `rgba(0,0,0,${0.03 + Math.sin(i + t) * 0.02})`;
        ctx.beginPath(); ctx.arc(sx, sy, 2 + Math.random() * 3, 0, Math.PI * 2); ctx.fill();
    }
    
    // Dark mud patches
    ctx.fillStyle = 'rgba(30, 15, 5, 0.25)';
    ctx.beginPath(); ctx.ellipse(W * 0.2, H * 0.3, 60, 20, 0.1, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(W * 0.65, H * 0.5, 50, 15, -0.1, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(W * 0.4, H * 0.75, 70, 18, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(W * 0.8, H * 0.2, 40, 12, 0.2, 0, Math.PI * 2); ctx.fill();
    
    // Light mud highlights
    ctx.fillStyle = 'rgba(120, 90, 50, 0.15)';
    ctx.beginPath(); ctx.ellipse(W * 0.5, H * 0.15, 55, 14, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(W * 0.3, H * 0.6, 45, 12, 0.1, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(W * 0.75, H * 0.7, 50, 13, -0.1, 0, Math.PI * 2); ctx.fill();
    
    // Small pebbles/rocks
    for (let i = 0; i < 15; i++) {
        const rx = ((i * 7 + 3) % 100) / 100 * W;
        const ry = ((i * 13 + 5) % 100) / 100 * H;
        ctx.fillStyle = 'rgba(80, 60, 35, 0.4)';
        ctx.beginPath(); ctx.ellipse(rx, ry, 3 + (i % 4), 2 + (i % 3), i * 0.5, 0, Math.PI * 2); ctx.fill();
    }
}

function updateParticles(){for(let p of particles){p.x+=p.vx;p.y+=p.vy;if(!p.isSplat)p.vy+=0.1;p.life-=0.025}particles=particles.filter(p=>p.life>0)}
function drawParticles(){for(let p of particles){ctx.save();ctx.globalAlpha=p.life;ctx.fillStyle=p.color;if(p.isSplat){ctx.beginPath();ctx.ellipse(p.x,p.y,p.size*2,p.size*.5,0,0,Math.PI*2);ctx.fill()}else{ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill()}ctx.restore()}}
function updateCountDisplay(){errCountEl.textContent=errorTarget;warnCountEl.textContent=warningTarget}
function setTargets(errors,warnings){errorTarget=errors;warningTarget=warnings;const tot=errors+warnings;bugs=bugs.filter(b=>b.alive);while(bugs.length>tot){const b=bugs.pop();if(b)b.alive=false}while(bugs.length<tot)bugs.push(new Bug(undefined,bugs.length>=errors));updateCountDisplay()}
function gameLoop(){frame++;if(comboTimer>0){comboTimer--;if(!comboTimer){combo=0;comboEl.textContent='0'}}updateParticles();ctx.clearRect(0,0,W,H);drawEnv();for(let b of bugs){b.update();b.draw(ctx)}drawParticles();requestAnimationFrame(gameLoop)}
canvas.addEventListener('click',e=>{const r=canvas.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;for(let i=bugs.length-1;i>=0;i--){if(bugs[i].alive&&bugs[i].contains(mx,my)){bugs[i].squish();break}}});
window.addEventListener('message',e=>{if(e.data.command==='setTargets')setTargets(e.data.errors,e.data.warnings)});
resize();
try{const vscode=acquireVsCodeApi();vscode.postMessage({command:'ready'});}catch(e){}
gameLoop();
</script>
</body>
</html>
